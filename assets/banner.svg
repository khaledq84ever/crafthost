<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#0a1122"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E676"/><stop offset="1" stop-color="#00C853"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.8">
      <stop offset="0" stop-color="#00C853" stop-opacity="0.25"/><stop offset="1" stop-color="#00C853" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- isometric "blocks" motif -->
  <g opacity="0.9">
    <g transform="translate(930,150)">
      <!-- cube 1 -->
      <polygon points="0,40 60,10 120,40 60,70" fill="#00C853"/>
      <polygon points="0,40 0,110 60,140 60,70" fill="#00A846"/>
      <polygon points="120,40 120,110 60,140 60,70" fill="#00913c"/>
    </g>
    <g transform="translate(1010,200)">
      <polygon points="0,40 60,10 120,40 60,70" fill="#FFB300"/>
      <polygon points="0,40 0,110 60,140 60,70" fill="#d99700"/>
      <polygon points="120,40 120,110 60,140 60,70" fill="#bd8400"/>
    </g>
    <g transform="translate(870,250)">
      <polygon points="0,40 60,10 120,40 60,70" fill="#1E293B" stroke="#334155"/>
      <polygon points="0,40 0,110 60,140 60,70" fill="#162033" stroke="#334155"/>
      <polygon points="120,40 120,110 60,140 60,70" fill="#101a2b" stroke="#334155"/>
    </g>
  </g>

  <!-- logo -->
  <g transform="translate(72,70)">
    <rect width="68" height="68" rx="16" fill="url(#em)"/>
    <g transform="translate(16,16)" fill="#0F172A">
      <rect x="0" y="0" width="16" height="16" rx="2"/><rect x="20" y="0" width="16" height="16" rx="2"/>
      <rect x="0" y="20" width="16" height="16" rx="2"/><rect x="20" y="20" width="16" height="16" rx="2" opacity="0.55"/>
    </g>
  </g>

  <text x="160" y="100" fill="#F8FAFC" font-size="52" font-weight="800" letter-spacing="-1.5">CraftHost</text>
  <text x="162" y="142" fill="#94A3B8" font-size="22" font-weight="500">Minecraft server hosting — instant deploys, custom JARs, one-click public play</text>

  <!-- feature pills -->
  <g font-size="15.5" font-weight="600">
    <g transform="translate(162,178)">
      <rect width="196" height="38" rx="19" fill="#10241c" stroke="#1f5138"/>
      <circle cx="22" cy="19" r="5.5" fill="#00C853"/><text x="38" y="24" fill="#cdeede">Java + Bedrock</text>
    </g>
    <g transform="translate(370,178)">
      <rect width="210" height="38" rx="19" fill="#10241c" stroke="#1f5138"/>
      <circle cx="22" cy="19" r="5.5" fill="#FFB300"/><text x="38" y="24" fill="#cdeede">playit.gg tunnels</text>
    </g>
    <g transform="translate(592,178)">
      <rect width="186" height="38" rx="19" fill="#10241c" stroke="#1f5138"/>
      <circle cx="22" cy="19" r="5.5" fill="#00C853"/><text x="38" y="24" fill="#cdeede">Live RCON console</text>
    </g>
  </g>

  <!-- terminal chip -->
  <g transform="translate(162,250)">
    <rect width="616" height="96" rx="12" fill="#0b1322" stroke="#1e293b"/>
    <g transform="translate(18,22)">
      <circle cx="0" cy="0" r="5" fill="#ef4444"/><circle cx="16" cy="0" r="5" fill="#FFB300"/><circle cx="32" cy="0" r="5" fill="#00C853"/>
    </g>
    <text x="18" y="58" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#94A3B8">$ <tspan fill="#00E676">crafthost</tspan> deploy --type paper --version 1.21.4</text>
    <text x="18" y="80" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#64748b">&#10003; server live at <tspan fill="#FFB300">play.crafthost.gg:25565</tspan> in 11s</text>
  </g>

  <text x="72" y="375" fill="#475569" font-size="15" font-weight="500">Express &#183; Docker (itzg/minecraft-server) &#183; SQLite &#183; deployed on Railway</text>
</svg>
