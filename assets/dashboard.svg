  <g transform="translate(44,470)"><rect x="-12" y="-18" width="166" height="44" rx="11" fill="#1E293B"/><circle cx="8" cy="4" r="13" fill="#334155"/><text x="30" y="0" fill="#E2E8F0" font-size="13" font-weight="600">khaled</text><text x="30" y="16" fill="#64748b" font-size="11">Pro plan</text></g>

