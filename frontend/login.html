<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#07090F" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#07090F" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CraftHost" />
<meta name="format-detection" content="telephone=no" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="manifest" href="/manifest.json" />
<title>Sign in · CraftHost</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-main">
    <div class="auth-card">
      <a href="/" class="auth-brand"><span class="brand-mark">C</span><span>CraftHost</span></a>
      <h2 data-i18n="sign_in">Sign in</h2>
      <p class="sub" data-i18n="auth_signin_sub">Welcome back. Pick up where you left off.</p>

      <form id="loginForm">
        <div class="field">
          <label class="label" data-i18n="auth_email">Email or username</label>
          <input type="text" name="email" id="loginEmail" class="input" placeholder="you@example.com" autocomplete="username" required />
        </div>
        <div class="field">
          <div class="row-between">
            <label class="label" data-i18n="auth_password">Password</label>
            <a href="/forgot.html" data-i18n="auth_forgot">Forgot?</a>
          </div>
          <input type="password" name="password" class="input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <label class="remember-row">
          <input type="checkbox" name="remember" id="rememberMe" checked />
          <span data-i18n="auth_remember">Keep me signed in for 30 days</span>
        </label>
        <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="sign_in">Sign in →</button>
      </form>

      <p class="auth-foot"><span data-i18n="auth_no_account">No account yet?</span><a href="/register.html" data-i18n="sign_up">Create one</a></p>
    </div>
  </div>
</div>

<div class="toast-host" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
// If the session cookie is still valid (i.e. user previously chose "remember me"),
// bounce straight to the dashboard — no need to retype anything for 30 days.
(async function autoRedirect() {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (!r.ok) return;
    const next = new URLSearchParams(location.search).get('next') || '/dashboard.html';
    const safeNext = next.startsWith('/') && !next.startsWith('//') ? next : '/dashboard.html';
    location.replace(safeNext);
  } catch {}
})();

// Pre-fill the email/username from the previous successful sign-in so a returning
// user — even one who explicitly signed out — only has to type their password.
(function prefillEmail() {
  try {
    const saved = localStorage.getItem('crafthost.lastEmail');
    if (saved) {
      const el = document.getElementById('loginEmail');
      if (el && !el.value) {
        el.value = saved;
        document.addEventListener('DOMContentLoaded', () => {
          const pw = document.querySelector('input[name="password"]');
          if (pw) pw.focus();
        });
      }
    }
    const remPref = localStorage.getItem('crafthost.remember');
    if (remPref === '0') {
      const cb = document.getElementById('rememberMe');
      if (cb) cb.checked = false;
    }
  } catch {}
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const email = fd.get('email');
  const password = fd.get('password');
  const remember = document.getElementById('rememberMe')?.checked !== false;
  try {
    const r = await api('/api/auth/login', { method: 'POST', body: { email, password, remember } });
    if (r.token) {
      try {
        localStorage.setItem('crafthost.lastEmail', email);
        localStorage.setItem('crafthost.remember', remember ? '1' : '0');
        if (r.user) localStorage.setItem('crafthost.user', JSON.stringify(r.user));
      } catch {}
      toast('Welcome back!');
      const next = new URLSearchParams(location.search).get('next') || '/dashboard.html';
      const safeNext = next.startsWith('/') && !next.startsWith('//') ? next : '/dashboard.html';
      setTimeout(() => location.href = safeNext, 600);
    }
  } catch (err) { toast(err.message || 'Sign-in failed', 'error'); }
});
</script>
</body>
</html>
