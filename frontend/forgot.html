<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#07090F" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#07090F" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CraftHost" />
<meta name="format-detection" content="telephone=no" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="manifest" href="/manifest.json" />
<title>Reset password · CraftHost</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-main">
    <div class="auth-card">
      <a href="/" class="auth-brand"><span class="brand-mark">C</span><span>CraftHost</span></a>
      <h2>Reset password</h2>
      <p class="sub">Enter your account email and we'll send a reset link.</p>
      <form id="forgotForm">
        <div class="field">
          <label class="label">Email</label>
          <input type="email" name="email" class="input" placeholder="you@example.com" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link →</button>
      </form>
      <p class="auth-foot">Back to<a href="/login.html">Sign in</a></p>
    </div>
  </div>
</div>
<div class="toast-host" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = e.target.querySelector('button[type="submit"]');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    await api('/api/auth/forgot', { method: 'POST', body: { email: fd.get('email') } });
    // The reset link is issued out-of-band (Discord) — never shown here, so
    // knowing someone's email is not enough to take over their account.
    const card = document.querySelector('.auth-card');
    card.innerHTML = `
      <h2>Reset requested</h2>
      <p class="sub">If an account exists for that email, a reset link is ready. Ping us on Discord and we'll send it to you after a quick check. <span dir="rtl">اطلب رابط الاستعادة عبر ديسكورد</span></p>
      <a href="https://discord.gg/zbHbSsCUua" target="_blank" rel="noopener" class="btn btn-primary btn-block btn-lg">Open Discord →</a>
      <p class="auth-foot">Back to<a href="/login.html">Sign in</a></p>
    `;
  } catch (err) {
    toast(err.message || 'Could not generate reset link', 'error');
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
});
</script>
</body>
</html>
