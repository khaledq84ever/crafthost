<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#07090F" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#07090F" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CraftHost" />
<meta name="format-detection" content="telephone=no" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="manifest" href="/manifest.json" />
<title>Create account · CraftHost</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-main">
    <div class="auth-card">
      <a href="/" class="auth-brand"><span class="brand-mark">C</span><span>CraftHost</span></a>
      <h2 data-i18n="auth_signup_title">Create your account</h2>
      <p class="sub" data-i18n="auth_signup_sub">Free forever for the starter plan. No card required.</p>

      <form id="regForm">
        <div class="field">
          <label class="label" data-i18n="auth_username">Username</label>
          <input type="text" name="username" class="input" placeholder="cooluser123" minlength="3" required />
        </div>
        <div class="field">
          <label class="label" data-i18n="auth_email">Email</label>
          <input type="email" name="email" class="input" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label class="label" data-i18n="auth_password">Password</label>
          <input type="password" id="pw" name="password" class="input" placeholder="At least 8 characters" minlength="8" required />
          <div class="password-strength"><div class="password-strength-bar" id="pwBar"></div></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="sign_up">Create account →</button>
      </form>

      <p class="auth-foot"><span data-i18n="auth_have_account">Already have an account?</span><a href="/login.html" data-i18n="sign_in">Sign in</a></p>
    </div>
  </div>
</div>

<div class="toast-host" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
const pw = document.getElementById('pw');
const bar = document.getElementById('pwBar');
pw.addEventListener('input', () => {
  let s = 0;
  if (pw.value.length >= 8) s++;
  if (/[A-Z]/.test(pw.value)) s++;
  if (/[0-9]/.test(pw.value)) s++;
  if (/[^A-Za-z0-9]/.test(pw.value)) s++;
  const colors = ['#F43F5E','#F59E0B','#F59E0B','#34D399','#34D399'];
  bar.style.width = (s * 25) + '%';
  bar.style.background = colors[s];
});

document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const r = await api('/api/auth/register', { method: 'POST', body: {
      username: fd.get('username'),
      email: fd.get('email'),
      password: fd.get('password')
    } });
    if (r.token) {
      try {
        localStorage.setItem('crafthost.lastEmail', fd.get('email'));
        if (r.user) localStorage.setItem('crafthost.user', JSON.stringify(r.user));
      } catch {}
      toast('Account created. Redirecting…');
      const next = new URLSearchParams(location.search).get('next') || '/dashboard.html';
      const safeNext = next.startsWith('/') && !next.startsWith('//') ? next : '/dashboard.html';
      setTimeout(() => location.href = safeNext, 700);
    }
  } catch (err) { toast(err.message || 'Sign-up failed', 'error'); }
});
</script>
</body>
</html>
