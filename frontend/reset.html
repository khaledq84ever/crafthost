<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Set new password · CraftHost</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-side">
    <a href="/" class="brand"><span class="brand-mark">C</span><span>CraftHost</span></a>
    <div>
      <h1>One more step</h1>
      <p>Set a new password for your account.</p>
    </div>
    <div style="color:var(--slate-500);font-size:13px;">© 2026 CraftHost</div>
  </div>
  <div class="auth-main">
    <div class="auth-card">
      <h2>Set new password</h2>
      <p class="sub" id="hint">Choose a strong password (8+ characters).</p>
      <form id="resetForm">
        <div class="field">
          <label class="label">New password</label>
          <input type="password" name="password" class="input" minlength="8" required autocomplete="new-password" />
        </div>
        <div class="field">
          <label class="label">Confirm password</label>
          <input type="password" name="confirm" class="input" minlength="8" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Set new password</button>
      </form>
      <p class="auth-foot">Remembered it? <a href="/login.html">Sign in</a></p>
    </div>
  </div>
</div>
<div class="toast-host" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('hint').innerHTML = '<span style="color:var(--red);">Missing reset token in the URL. Use the link from the reset request.</span>';
  document.getElementById('resetForm').style.display = 'none';
}
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const password = fd.get('password');
  const confirm = fd.get('confirm');
  if (password !== confirm) { toast('Passwords do not match', 'error'); return; }
  const btn = e.target.querySelector('button[type="submit"]');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '⏳ Updating…';
  try {
    await api('/api/auth/reset', { method: 'POST', body: { token, password } });
    toast('✓ Password updated — sign in with your new password');
    setTimeout(() => location.href = '/login.html', 1500);
  } catch (err) {
    toast(err.message || 'Reset failed', 'error');
    btn.disabled = false; btn.textContent = orig;
  }
});
</script>
</body>
</html>
